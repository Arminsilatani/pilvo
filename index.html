<body>
  <!-- ------------------------- TOP BAR ------------------------- -->
  <div class="top-bar">
    <img src="../assets/Pi.svg" alt="Pilvo logo" class="logo-img">
    <h1 class="site-title">
      <span class="pilvo">Pilvo</span>
      <span class="sub">Professional Text Editor</span>
    </h1>
  </div>

  <!-- ------------------------- TOOLBAR ------------------------- -->
  <div class="toolbar-scroll-wrapper" id="toolbarScrollWrapper">
    <button class="toolbar-arrow toolbar-arrow-left" id="toolbarArrowLeft" title="Scroll left">‹</button>
    <div class="toolbar-scroll-viewport">
      <div class="toolbar" id="toolbar">
        <!-- Undo / Redo -->
        <button class="tool-btn" data-cmd="undo" title="Undo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button class="tool-btn" data-cmd="redo" title="Redo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <span class="divider"></span>

        <!-- Bold / Italic / Underline / Strikethrough -->
        <button class="tool-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="tool-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="tool-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <button class="tool-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
        <span class="divider"></span>

        <!-- Font Size -->
        <select class="tool-select" id="fontSizeSelect" title="Font Size">
          <option value="1">8px</option>
          <option value="2">10px</option>
          <option value="3" selected>12px</option>
          <option value="4">14px</option>
          <option value="5">18px</option>
          <option value="6">24px</option>
          <option value="7">36px</option>
        </select>
        <span class="divider"></span>

        <!-- Headings -->
        <button class="tool-btn" data-cmd="formatBlock" data-value="h1" title="Heading 1">H1</button>
        <button class="tool-btn" data-cmd="formatBlock" data-value="h2" title="Heading 2">H2</button>
        <button class="tool-btn" data-cmd="formatBlock" data-value="h3" title="Heading 3">H3</button>
        <button class="tool-btn" data-cmd="formatBlock" data-value="p" title="Paragraph">¶</button>
        <span class="divider"></span>

        <!-- Lists -->
        <button class="tool-btn" data-cmd="insertUnorderedList" title="Bullet List">•</button>
        <button class="tool-btn" data-cmd="insertOrderedList" title="Numbered List">1.</button>
        <span class="divider"></span>

        <!-- Alignment -->
        <button class="tool-btn" data-cmd="justifyLeft" title="Align Left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="17" y1="10" x2="3" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="17" y1="14" x2="3" y2="14"/>
            <line x1="21" y1="18" x2="3" y2="18"/>
          </svg>
        </button>
        <button class="tool-btn" data-cmd="justifyCenter" title="Center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="10" x2="6" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="18" y1="14" x2="6" y2="14"/>
            <line x1="21" y1="18" x2="3" y2="18"/>
          </svg>
        </button>
        <button class="tool-btn" data-cmd="justifyRight" title="Align Right">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="21" y1="10" x2="7" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="21" y1="14" x2="7" y2="14"/>
            <line x1="21" y1="18" x2="3" y2="18"/>
          </svg>
        </button>

        <!-- Text Color -->
        <button class="tool-btn" id="textColorBtn" title="Text Color">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/><line x1="12" y1="20" x2="12" y2="22"/></svg>
        </button>
        <input type="color" id="textColorInput" class="hidden-color-input" value="#f0f0f0">

        <!-- Background Color -->
        <button class="tool-btn" id="bgColorBtn" title="Background Color">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
        </button>
        <input type="color" id="bgColorInput" class="hidden-color-input" value="#000000">
        <span class="divider"></span>

        <!-- Link / Unlink -->
        <button class="tool-btn" data-cmd="createLink" title="Insert Link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="tool-btn" data-cmd="unlink" title="Remove Link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
        </button>

        <!-- Insert Image -->
        <button class="tool-btn" id="insertImageBtn" title="Insert Image URL">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>

        <!-- Insert Table -->
        <button class="tool-btn" id="insertTableBtn" title="Insert Table">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        </button>

        <!-- Clean HTML -->
        <button class="tool-btn" id="cleanHtmlBtn" title="Strip All HTML">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21 5.2c.8.8.8 2 0 2.8L10 19"/>
            <line x1="6" y1="20" x2="10" y2="20"/>
            <path d="M18 8l-6 6"/>
            <path d="M14 4l2 2"/>
          </svg>
        </button>

        <!-- Remove Format -->
        <button class="tool-btn" id="removeFormatBtn" title="Remove Format">T<sub>x</sub></button>
        <span class="divider"></span>

        <!-- Code View -->
        <button class="tool-btn" id="codeViewBtn" title="Code View">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>

        <!-- Emoji -->
        <button class="tool-btn" id="emojiBtn" title="Emoji">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="15" x2="16" y2="15"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>

        <!-- Fullscreen -->
        <button class="tool-btn" id="fullscreenBtn" title="Fullscreen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>

        <!-- Import -->
        <button class="tool-btn" id="importBtn" title="Import .html/.md/.txt">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <input type="file" id="importFileInput" accept=".html,.md,.txt" style="display:none;">
        <span class="divider"></span>

        <!-- SEO Preview -->
        <button class="tool-btn" id="seoBtn" title="SEO Preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </button>

        <!-- Export -->
        <button class="tool-btn" id="exportTxtBtn" title="Export as .txt">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>

        <!-- Lorem Ipsum -->
        <button class="tool-btn" id="loremBtn" title="Insert Lorem Ipsum">Li</button>
      </div> <!-- /toolbar -->
    </div> <!-- /toolbar-scroll-viewport -->
    <button class="toolbar-arrow toolbar-arrow-right" id="toolbarArrowRight" title="Scroll right">›</button>
  </div> <!-- /toolbar-scroll-wrapper -->

  <!-- ------------------------- EMOJI PANEL ------------------------- -->
  <div class="emoji-panel" id="emojiPanel">
    <div class="emoji-row" id="emojiRow"></div>
  </div>

  <!-- ------------------------- MODALS (TABLE / SEO / LINK) ------------------------- -->
  <!-- Table Modal -->
  <div id="tableModal" class="link-modal-overlay" style="display:none;">
    <div class="link-modal">
      <h3>Insert Table</h3>
      <div style="display: flex; gap: 16px; margin-bottom: 16px;">
        <div>
          <label for="tableRows">Rows</label>
          <input type="number" id="tableRows" min="1" max="10" value="3" style="width:80px;">
        </div>
        <div>
          <label for="tableCols">Columns</label>
          <input type="number" id="tableCols" min="1" max="10" value="3" style="width:80px;">
        </div>
      </div>
      <div class="link-modal-actions">
        <button id="tableInsertBtn">Insert</button>
        <button id="tableCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- SEO Panel -->
  <div id="seoPanel" class="seo-panel" style="display:none;">
    <div class="seo-content">
      <h3>SEO Preview</h3>
      <div class="seo-metric">
        <span>Reading time:</span>
        <strong id="seoReadingTime">0 min</strong>
      </div>
      <div class="seo-metric">
        <span>Word count:</span>
        <strong id="seoWordCount">0</strong>
      </div>
      <div class="seo-metric">
        <span>Keyword density (top 5):</span>
        <ul id="seoKeywords"></ul>
      </div>
      <div class="seo-metric">
        <span>Meta description preview:</span>
        <p id="seoMetaDesc" class="seo-meta-preview"></p>
      </div>
      <button id="seoCloseBtn" class="tool-btn" style="margin-top:8px;">Close</button>
    </div>
  </div>

  <!-- Link Modal -->
  <div id="linkModal" class="link-modal-overlay" style="display:none;">
    <div class="link-modal">
      <h3>Link Settings</h3>
      <label for="linkUrlInput">URL</label>
      <input type="text" id="linkUrlInput" placeholder="https://example.com">
      <div class="link-option-row">
        <input type="checkbox" id="linkTargetBlank">
        <label for="linkTargetBlank">Open in new tab</label>
      </div>
      <div class="rel-section">
        <p class="rel-label">rel options:</p>
        <div class="rel-checks">
          <label><input type="checkbox" class="rel-check" value="nofollow"> nofollow</label>
          <label><input type="checkbox" class="rel-check" value="sponsored"> sponsored</label>
          <label><input type="checkbox" class="rel-check" value="ugc"> ugc</label>
          <label><input type="checkbox" class="rel-check" value="noopener"> noopener</label>
          <label><input type="checkbox" class="rel-check" value="noreferrer"> noreferrer</label>
        </div>
      </div>
      <div class="link-modal-actions">
        <button id="linkInsertBtn">Insert / Update</button>
        <button id="linkRemoveBtn" style="display:none;">Remove Link</button>
        <button id="linkCancelBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ------------------------- EDITOR ------------------------- -->
  <div class="editor-wrapper">
    <div class="editor-container">
      <div class="editor" id="editor" contenteditable="true" lang="en" dir="ltr"></div>
      <button class="copy-all-btn" id="copyAllBtn" title="Copy all text" style="display: none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
    <div class="counter-bar">
      <span class="counter" id="wordCharCounter">Words: 0 · Chars: 0</span>
    </div>
  </div>

  <!-- ------------------------- FOOTER ------------------------- -->
  <footer class="footer">
    <div class="footer-signature">
      <a href="https://arminsilatani.com/en/" target="_blank" rel="noopener noreferrer">
        <span class="crafted">crafted by</span>
        <img src="/assets/ArminSilatani.svg" alt="Armin Silatani" class="signature">
      </a>
    </div>
  </footer>

  <!-- ------------------------- SCRIPTS ------------------------- -->
  <script src="../assets/Pilvo.js"></script>
